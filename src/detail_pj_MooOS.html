<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Detail Penanggungjawab | MooOS - Manajemen Ternak</title>
</head>

<body x-data="{ page: 'anggotaMooOS', 'loaded': true, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
  class="bg-gray-50 text-gray-800">
  <!-- ===== Preloader Start ===== -->
  <include src="./partials/preloader.html"></include>
  <!-- ===== Preloader End ===== -->

  <!-- ===== Page Wrapper Start ===== -->
  <div class="flex h-screen overflow-hidden">
    <!-- ===== Sidebar Start ===== -->
    <include src="./partials/sidebar.html"></include>
    <!-- ===== Sidebar End ===== -->

    <!-- ===== Content Area Start ===== -->
    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <!-- Small Device Overlay Start -->
      <include src="./partials/overlay.html" />
      <!-- Small Device Overlay End -->

      <!-- ===== Header Start ===== -->
      <include src="./partials/header.html" />
      <!-- ===== Header End ===== -->

      <!-- ===== Main Content Start ===== -->
      <main>
        <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">

          <!-- CONTAINER CARD UTAMA (max-w-5xl) -->
          <div
            class="max-w-5xl mx-auto w-full bg-white border border-gray-100 rounded-2xl shadow-sm p-6 md:p-8 space-y-6">

            <!-- GRID KONTEN (cols-12) -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

              <!-- 2. KOLOM KIRI - Area Identitas & Visual (lg:col-span-4) -->
              <div class="lg:col-span-4 space-y-6">
                <div class="flex items-center gap-3.5">
                  <!-- Back Arrow Link -->
                  <a href="anggota_MooOS.html"
                    class="p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-50 transition-colors inline-flex items-center justify-center"
                    title="Kembali">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="19" y1="12" x2="5" y2="12" />
                      <polyline points="12 19 5 12 12 5" />
                    </svg>
                  </a>
                  <div>
                    <div class="flex items-center gap-2.5">
                      <h1 id="pj-id-title" class="text-2xl font-bold text-slate-800 tracking-tight">PJ-000</h1>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Detail Profil Penanggungjawab</p>
                  </div>
                </div>

                <div
                  class="flex flex-col items-center justify-center p-6 border border-gray-100 rounded-xl bg-gray-50/50">
                  <div id="pj-initials"
                    class="w-24 h-24 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-3xl font-bold mb-4 shadow-inner">
                    —
                  </div>
                  <h2 id="pj-name" class="text-lg font-bold text-slate-800 text-center">—</h2>
                  <span id="pj-role"
                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-gray-200 text-gray-700 mt-2">Penanggungjawab
                    Ternak</span>
                  <span id="pj-barn"
                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-700 mt-1 hidden">Kandang
                    —</span>
                </div>

                <!-- Quick Stats Section -->
                <div class="space-y-3">
                  <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Statistik Kandang</h3>

                  <div
                    class="border border-emerald-100 rounded-xl p-4 bg-emerald-50/30 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                      <div
                        class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                          <circle cx="12" cy="12" r="10" />
                        </svg>
                      </div>
                      <span class="text-sm text-gray-600 font-medium">Total Sapi</span>
                    </div>
                    <span id="cow-total" class="text-sm font-bold text-slate-800">0</span>
                  </div>
                </div>
              </div>

              <!-- 3. KOLOM KANAN - Area Data & Sapi (lg:col-span-8) -->
              <div class="lg:col-span-8 flex flex-col gap-6">

                <!-- DATA PRIBADI -->
                <div class="space-y-4">
                  <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Data Pribadi (Rahasia)</h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <!-- NIK -->
                    <div class="border border-gray-100 rounded-xl p-4 bg-gray-50/50 flex items-center gap-3">
                      <div
                        class="w-10 h-10 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <rect width="18" height="14" x="3" y="5" rx="2" ry="2" />
                          <line x1="7" x2="7.01" y1="15" y2="15" />
                          <line x1="11" x2="11.01" y1="15" y2="15" />
                          <line x1="15" x2="15.01" y1="15" y2="15" />
                          <line x1="7" x2="7.01" y1="9" y2="9" />
                          <line x1="11" x2="11.01" y1="9" y2="9" />
                          <line x1="15" x2="15.01" y1="9" y2="9" />
                        </svg>
                      </div>
                      <div>
                        <span class="block text-xs text-gray-400 font-medium">Nomor Induk Kependudukan</span>
                        <span id="pj-nik"
                          class="block text-sm font-bold text-slate-800 font-mono tracking-wide">—</span>
                      </div>
                    </div>

                    <!-- Kontak -->
                    <div class="border border-gray-100 rounded-xl p-4 bg-gray-50/50 flex items-center gap-3">
                      <div
                        class="w-10 h-10 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                      </div>
                      <div>
                        <span class="block text-xs text-gray-400 font-medium">Nomor Telepon / WhatsApp</span>
                        <span id="pj-phone"
                          class="block text-sm font-bold text-slate-800 font-mono tracking-wide">—</span>
                      </div>
                    </div>

                    <!-- Alamat -->
                    <div
                      class="md:col-span-2 border border-gray-100 rounded-xl p-4 bg-gray-50/50 flex items-start gap-3">
                      <div
                        class="w-10 h-10 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                          <circle cx="12" cy="10" r="3" />
                        </svg>
                      </div>
                      <div>
                        <span class="block text-xs text-gray-400 font-medium mb-1">Alamat Lengkap</span>
                        <span id="pj-alamat" class="block text-sm text-slate-800 leading-relaxed">—</span>
                      </div>
                    </div>

                  </div>
                </div>

                <!-- DAFTAR SAPI DI KANDANG -->
                <div class="space-y-4 pt-4 border-t border-gray-100">
                  <div class="flex items-center justify-between">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Sapi yang Diurus</h3>
                    <span id="cow-count-badge"
                      class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600">0
                      Sapi</span>
                  </div>

                  <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
                    <table class="w-full text-left border-collapse">
                      <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                          <th class="p-3 text-xs font-semibold text-gray-500 uppercase">ID Sapi</th>
                          <th class="p-3 text-xs font-semibold text-gray-500 uppercase">Jenis</th>
                          <th class="p-3 text-xs font-semibold text-gray-500 uppercase">Pemilik</th>
                          <th class="p-3 text-xs font-semibold text-gray-500 uppercase">Status</th>
                        </tr>
                      </thead>
                      <tbody id="cows-tbody" class="divide-y divide-gray-100">
                        <tr>
                          <td colspan="4" class="p-6 text-center text-sm text-gray-400">Memuat data ternak...</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                <!-- FOOTER ACTIONS -->
                <div class="flex items-center justify-end gap-3 pt-6 mt-auto border-t border-gray-100">
                  <button
                    class="inline-flex items-center justify-center rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-gray-800 transition-colors focus:outline-none">
                    Edit Data Penanggungjawab
                  </button>
                </div>

              </div>

            </div>

          </div>

          <!-- VANILLA JAVASCRIPT FOR DYNAMIC DATA -->
          <script>
            const API = 'http://localhost:8000';

            function getStatusBadge(status) {
              const map = {
                'AVAILABLE': { label: 'Tersedia', cls: 'bg-green-50 text-green-700 border-green-200' },
                'LOOKING_FOR_CARETAKER': { label: 'Mencari Perawat', cls: 'bg-yellow-50 text-yellow-700 border-yellow-200' },
                'WAITING_CONFIRMATION': { label: 'Menunggu Konfirmasi', cls: 'bg-orange-50 text-orange-700 border-orange-200' },
                'SOLD': { label: 'Terjual', cls: 'bg-blue-50 text-blue-700 border-blue-200' },
                'REJECTED': { label: 'Ditolak', cls: 'bg-red-50 text-red-700 border-red-200' },
              };
              const s = map[status] || { label: status, cls: 'bg-gray-100 text-gray-600 border-gray-200' };
              return `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-semibold border ${s.cls}">${s.label}</span>`;
            }

            async function loadPJDetail() {
              const params = new URLSearchParams(window.location.search);
              const pjId = params.get('id');

              if (!pjId) {
                alert('ID Penanggungjawab tidak valid');
                window.location.href = 'anggota_MooOS.html';
                return;
              }

              try {
                const res = await fetch(`${API}/penanggungjawab/${pjId}`);
                if (!res.ok) throw new Error('Data penanggungjawab tidak ditemukan');
                const m = await res.json();

                const pjid = String(m.id).padStart(3, '0');
                document.getElementById('pj-id-title').textContent = `PJ-${pjid}`;

                document.getElementById('pj-name').textContent = m.name;
                const initials = m.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
                document.getElementById('pj-initials').textContent = initials;

                if (m.barn) {
                  const barnBadge = document.getElementById('pj-barn');
                  barnBadge.textContent = `Kandang ${m.barn}`;
                  barnBadge.classList.remove('hidden');
                }

                // Data Pribadi
                document.getElementById('pj-nik').textContent = m.nik || '—';
                document.getElementById('pj-phone').textContent = m.phone || '—';
                document.getElementById('pj-alamat').textContent = m.alamat || '—';

                // Cows
                document.getElementById('cow-count-badge').textContent = `${m.cows.length} Sapi`;
                document.getElementById('cow-total').textContent = m.cows.length;
                const tbody = document.getElementById('cows-tbody');
                if (m.cows.length === 0) {
                  tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-sm text-gray-400">Belum ada sapi di kandang ini.</td></tr>`;
                } else {
                  tbody.innerHTML = m.cows.map(cow => `
                      <tr onclick="window.location.href='detail_sapi_MooOS.html?code=${cow.cow_code}'" class="hover:bg-gray-50/50 transition-colors cursor-pointer border-b border-gray-50 last:border-0">
                        <td class="p-3 text-sm font-mono text-gray-600 font-semibold">${cow.cow_code}</td>
                        <td class="p-3 text-sm text-gray-600">${cow.jenis || '—'}</td>
                        <td class="p-3 text-sm text-gray-600 font-medium">${cow.owner_name}</td>
                        <td class="p-3">${getStatusBadge(cow.status)}</td>
                      </tr>
                    `).join('');
                }

              } catch (err) {
                console.error(err);
                alert(err.message);
              }
            }

            document.addEventListener('DOMContentLoaded', loadPJDetail);
          </script>

        </div>
      </main>
      <!-- ===== Main Content End ===== -->
    </div>
    <!-- ===== Content Area End ===== -->
  </div>
  <!-- ===== Page Wrapper End ===== -->
</body>

</html>
