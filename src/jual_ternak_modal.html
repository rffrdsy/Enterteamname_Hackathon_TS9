<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop-up Penjualan Ternak | MooOS Component</title>
    <!-- Tailwind CSS CDN for standalone preview -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                800: '#1e293b',
                900: '#0f172a',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-6 text-gray-800">

    <!-- Outer Container for Demo Showcase -->
    <div class="w-full max-w-md bg-slate-800 border border-slate-700/50 rounded-2xl p-8 text-center shadow-2xl space-y-6">
      <div class="space-y-2">
        <h1 class="text-xl font-bold text-white tracking-tight">Demo Pop-up Penjualan Ternak</h1>
        <p class="text-sm text-slate-400">Klik tombol di bawah ini untuk memicu modal pengisian data pembeli Pihak II.</p>
      </div>

      <!-- 1. TOMBOL TRIGGER -->
      <div class="pt-4 flex justify-center">
        <button 
          id="btn-trigger-jual"
          onclick="openModal()" 
          class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md shadow-lg shadow-blue-600/20 transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0 focus:outline-none"
        >
          Jual Ternak
        </button>
      </div>
    </div>

    <!-- 2. MODAL OVERLAY & CONTAINER -->
    <div 
      id="modal-jual" 
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-xs p-4"
    >
      <!-- Card Modal -->
      <div class="bg-white rounded-lg shadow-2xl border border-gray-100 w-full max-w-md p-6 md:p-8 space-y-6 transform transition-all duration-300">
        
        <!-- 3. ISI MODAL - STATE 1: FORM PENGISIAN -->
        <div id="modal-form-view" class="space-y-6">
          <!-- Header -->
          <div class="flex items-center gap-3.5 border-b border-gray-100 pb-4">
            <!-- User Icon Wrapper -->
            <div class="w-11 h-11 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div>
              <h2 class="text-xl font-bold text-slate-800 tracking-tight">Data Pembeli Pihak II</h2>
              <p class="text-xs text-gray-400">Masukkan identitas lengkap pembeli ternak</p>
            </div>
          </div>

          <!-- Form Inputs -->
          <form id="sell-form" onsubmit="submitForm(event)" class="space-y-4">
            <!-- Nama Lengkap -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-slate-700">Nama Lengkap</label>
              <input 
                type="text" 
                required
                placeholder="Masukkan nama sesuai KTP" 
                class="w-full border border-gray-300 rounded-md p-3 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm transition-colors"
              />
            </div>

            <!-- NIK -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-slate-700">Nomor Induk Kependudukan (NIK)</label>
              <input 
                type="text" 
                required
                pattern="\d{16}"
                title="NIK harus berjumlah 16 digit angka"
                placeholder="16 digit NIK" 
                class="w-full border border-gray-300 rounded-md p-3 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm transition-colors"
              />
            </div>

            <!-- Alamat Lengkap -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-slate-700">Alamat Lengkap</label>
              <textarea 
                required
                rows="3"
                placeholder="Jalan, RT/RW, Desa..." 
                class="w-full border border-gray-300 rounded-md p-3 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm transition-colors resize-none"
              ></textarea>
            </div>

            <!-- No. Telepon / WhatsApp -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-slate-700">No. Telepon / WhatsApp</label>
              <input 
                type="text" 
                required
                placeholder="08..." 
                class="w-full border border-gray-300 rounded-md p-3 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm transition-colors"
              />
            </div>

            <!-- Footer Form Buttons -->
            <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
              <button 
                type="button" 
                onclick="closeModal()"
                class="inline-flex items-center justify-center rounded-md border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200"
              >
                Batal
              </button>
              <button 
                type="submit" 
                class="inline-flex items-center justify-center rounded-md bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 text-sm font-semibold transition-colors focus:outline-none shadow-sm shadow-blue-600/10 focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
              >
                Kirim
              </button>
            </div>
          </form>
        </div>

        <!-- 4. ISI MODAL - STATE 2: KONFIRMASI SUKSES -->
        <div id="modal-success-view" class="hidden flex flex-col items-center text-center space-y-4 py-4">
          <!-- Checklist Icon -->
          <div class="w-16 h-16 rounded-full bg-green-100 text-green-600 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          
          <div class="space-y-2">
            <h3 class="text-xl font-bold text-slate-800">Pengajuan Sedang Diproses</h3>
            <p class="text-sm text-gray-500 max-w-xs leading-relaxed">
              Data pembeli telah dicatat dan pengajuan penjualan ternak sedang menunggu verifikasi admin.
            </p>
          </div>
          
          <div class="w-full pt-4">
            <button 
              type="button"
              onclick="window.location.href='ternak_MooOS.html'"
              class="w-full inline-flex items-center justify-center rounded-md bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2.5 text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200"
            >
              Selesai
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- 5. LOGIKA JAVASCRIPT -->
    <script>
      function openModal() {
        document.getElementById('modal-jual').classList.remove('hidden');
        document.getElementById('modal-form-view').classList.remove('hidden');
        document.getElementById('modal-success-view').classList.add('hidden');
        document.getElementById('sell-form').reset();
      }

      function closeModal() {
        document.getElementById('modal-jual').classList.add('hidden');
      }

      function submitForm(e) {
        e.preventDefault();
        document.getElementById('modal-form-view').classList.add('hidden');
        document.getElementById('modal-success-view').classList.remove('hidden');
      }
    </script>
  </body>
</html>
